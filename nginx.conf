server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache long pour les assets fingerprintés par Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy des appels API vers le backend.
    # On utilise une variable + le resolver DNS interne de Docker (127.0.0.11)
    # afin que nginx démarre même si le backend n'est pas encore joignable.
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $backend_upstream http://backend:3001;
        proxy_pass         $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Fallback SPA : toutes les routes renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
