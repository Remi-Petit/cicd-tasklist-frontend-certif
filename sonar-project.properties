sonar.projectKey=remi-tasklist-frontend
sonar.projectName=Remi - TaskList Frontend

# URL du serveur SonarQube
sonar.host.url=https://sonarqube.cicd.kits.ext.educentre.fr

# Sources
sonar.sources=src

# Tests
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.test.ts,src/__tests__/**/*.test.tsx

# Exclusions
sonar.exclusions=\
node_modules/**,\
dist/**,\
coverage/**,\
reports/**,\
public/**,\
src/main.tsx,\
src/vite-env.d.ts,\
**/*.config.ts,\
**/*.config.js

sonar.test.exclusions=\
node_modules/**,\
dist/**

# Couverture de tests TypeScript / JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encodage
sonar.sourceEncoding=UTF-8

# Duplication
sonar.cpd.exclusions=\
src/__tests__/**
